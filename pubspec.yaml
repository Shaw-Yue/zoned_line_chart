name: zoned_line_chart
description: >
  A highly customizable line chart widget for Flutter featuring colored zone
  backgrounds, automatic axis ticking, smooth Catmull-Rom curves, and
  interactive tap-to-inspect tooltips.
version: 1.1.4
homepage: https://github.com/Shaw-Yue/zoned_line_chart
repository: https://github.com/Shaw-Yue/zoned_line_chart
issue_tracker: https://github.com/Shaw-Yue/zoned_line_chart/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  intl: '>=0.19.0 <1.0.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

topics:
  - chart
  - line-chart
  - data-visualization
  - custom-painter

